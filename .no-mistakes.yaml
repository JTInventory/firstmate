# Per-repo no-mistakes overrides.

# Gate agents must not load firstmate's project-level captain instructions. The
# lifecycle entrypoints also refuse the stamped gate marker and gate-repo path.
disable_project_settings: true

# Run the firstmate PR-target guard and bash behavior suite through the local
# runner instead of delegating to an agent (an agent-driven test step has
# crashed the daemon). The runner keeps every test and failure gate intact
# while allowing bounded parallelism with per-test temp roots. The e2e tests
# need tmux on PATH, which the firstmate environment provides.
commands:
  test: 'bash bin/fm-run-behavior-tests.sh'

# Keep test evidence out of this repo; it stays in a temp dir instead.
test:
  evidence:
    store_in_repo: false
