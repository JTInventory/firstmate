name: Require no-mistakes

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: no-mistakes-required-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: PR must be raised via no-mistakes
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Verify no-mistakes signature in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          marker='Updates from [git push no-mistakes](https://github.com/kunchenguid/no-mistakes)'
          has_marker() {
            printf '%s' "$1" | grep -qF -- "$marker"
          }
          if has_marker "${PR_BODY:-}"; then
            echo "Found no-mistakes signature in PR #${PR_NUMBER} body."
            exit 0
          fi
          # no-mistakes can push the branch and write the pipeline body close
          # together; the pull_request payload can briefly lag the live body.
          deadline=$(( $(date +%s) + 90 ))
          while :; do
            live_body=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .body 2>/dev/null || true)
            if has_marker "$live_body"; then
              echo "Found no-mistakes signature in live PR #${PR_NUMBER} body."
              exit 0
            fi
            now=$(date +%s)
            [ "$now" -lt "$deadline" ] || break
            sleep 5
          done
          {
            echo "::error::This PR was not raised through no-mistakes."
            echo
            echo "Contributions to this repository must be submitted via 'git push no-mistakes'."
            echo "That pipeline runs the required review/test/lint/CI steps and writes a"
            echo "deterministic '## Pipeline' section into the PR body containing:"
            echo
            echo "    $marker"
            echo
            echo "See CONTRIBUTING.md for setup and the full workflow."
            echo
            echo "PR author: ${PR_AUTHOR}"
          } >&2
          exit 1
